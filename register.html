<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GMTDXB | Register</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"
      crossorigin="anonymous"
    ></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #0f1114;
        color: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-image: linear-gradient(
          160deg,
          rgba(0, 123, 255, 0.1) 0%,
          rgba(17, 24, 39, 1) 100%
        );
      }

      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      input {
        background-color: #1b1e23;
        border: 1px solid #2c2f35;
        color: white;
        border-radius: 6px;
        padding: 10px;
        width: 100%;
      }

      input:focus {
        outline: none;
        border-color: #3b82f6;
      }

      a {
        color: #3b82f6;
      }
    </style>
  </head>

  <body>
    <!-- ✅ REGISTER CARD -->
    <div class="glass p-8 rounded-2xl w-[90%] max-w-md shadow-lg text-center">
      <img
        src="https://res.cloudinary.com/ds1fnqy6s/image/upload/v1774975182/pstttlm8p4x4rd8aearl.png"
        alt="GMTDXB"
        class="w-14 mx-auto mb-4"
      />
      <h2 class="text-2xl font-bold mb-2 text-blue-400">Create Account</h2>
      <p class="text-gray-400 mb-6 text-sm">
        Join GMTDXB and start shopping smarter
      </p>

      <!-- 🔹 REGISTER FORM -->
      <form id="registerForm" class="space-y-5 text-left">
        <div>
          <label class="text-sm text-gray-400">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required />
        </div>

        <div>
          <label class="text-sm text-gray-400">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div>
          <label class="text-sm text-gray-400">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>

        <div>
          <label class="text-sm text-gray-400">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="••••••••"
            required
          />
        </div>

        <button
          type="submit"
          class="bg-blue-500 hover:bg-blue-600 w-full py-3 rounded-md text-white font-medium transition"
        >
          Sign Up
        </button>
      </form>

      <!-- 🔹 OR DIVIDER -->
      <div class="flex items-center gap-4 my-6 text-gray-500 text-sm">
        <hr class="flex-1 border-gray-700" />
        <span>OR</span>
        <hr class="flex-1 border-gray-700" />
      </div>

      <!-- 🔹 GOOGLE SIGNUP -->
      <button
        id="googleSignupBtn"
        class="flex items-center justify-center gap-3 glass w-full py-3 rounded-md hover:bg-blue-500/20 transition"
      >
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/0/09/Google_g_2015_logo.svg"
          class="w-5"
          alt="Google"
        />
        Continue with Google
      </button>

      <!-- 🔹 LOGIN LINK -->
      <p class="text-sm text-gray-400 mt-6">
        Already have an account?
        <a href="login.html" class="hover:underline">Sign in here</a>
      </p>
    </div>
   
    <!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<!-- Your JS -->
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
    <!-- ✅ SCRIPT -->
    <script>
      const form = document.getElementById("registerForm");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        if (password !== confirmPassword) {
          alert("⚠️ Passwords do not match!");
          return;
        }

        // TODO: Replace with Firebase signup logic
        console.log("Registering:", { name, email, password });
        alert("✅ Registration successful! Redirecting...");
        window.location.href = "login.html";
      });

      document
        .getElementById("googleSignupBtn")
        .addEventListener("click", () => {
          // TODO: Add Firebase Google signup
          alert("🌐 Google signup coming soon!");
        });
    </script>
 
  </body>
</html>
